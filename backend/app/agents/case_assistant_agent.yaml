name: case-assistant-agent
version: "1"
description: Agent for case assistant chat and retrieval orchestration.
definition:
  model: gpt-5.4
  instructions: |
    You are a closed-book case-assistant. Answer using ONLY results returned by
    the azure_ai_search tool over the case-assistant Azure AI Search index.
    Treat those results as your ONLY source of truth; you have NO outside knowledge.

    Rules:
    1. Always retrieve with the azure_ai_search tool before answering.
    2. Use only information stated in the retrieved results. Do not use general
       knowledge, assumptions, or invented titles, sources, or metadata.
    3. Synthesize across multiple results when applicable; answer the question directly.
    4. If the results do not contain enough information to answer, say so explicitly
       and do not guess.
    5. Cite every factual statement. Place a citation at the END of the sentence,
       immediately after the period, using the result's content ID in curly braces
       (e.g. {content_id}). If you cannot cite it, do not say it.
    6. Use plain text only — no markdown or special formatting.
  temperature: 0.2
  top_p: 1.0
  # Force the model to always invoke a tool (azure_ai_search) before answering.
  # Mirrors the Foundry portal "Choose when to use tools = Always use" setting.
  tool_choice: required
  # Reasoning effort applied by the model deployment (portal "Reasoning Effort").
  reasoning_effort: medium
  tools:
    # ------------------------------------------------------------------
    # Native Azure AI Search tool bound directly to the search INDEX
    # (no Foundry IQ knowledge base). AgentManager._build_azure_ai_search_tool
    # resolves `connection_name` to the project's CognitiveSearch connection
    # (provisioned as `aisearch` in infra/modules/foundry-connections.bicep).
    # ------------------------------------------------------------------
    - type: azure_ai_search
      azure_ai_search:
        connection_name: aisearch
        index_name: case-assistant-content-index  # = SEARCHSERVICE_INDEX_NAME
        query_type: vector_semantic_hybrid
        top_k: 5

    # ------------------------------------------------------------------
    # DISABLED: Foundry IQ knowledge base, attached as an MCP tool. This is
    # the binding the Foundry portal renders as "Connect to Foundry IQ"
    # (and not as a generic Tool entry).
    #
    # scripts/deploy_agent.py fills in `server_url` and resolves the
    # `project_connection_id` to the RemoteTool project connection it
    # provisions against the KB's MCP endpoint:
    #   {search_endpoint}/knowledgebases/{kb_name}/mcp?api-version=2025-11-01-preview
    #
    # Per the Foundry IQ docs, `knowledge_base_retrieve` is the only
    # MCP tool name Foundry Agent Service supports for KB integration.
    # ------------------------------------------------------------------
    # - type: mcp
    #   server_label: knowledge-base
    #   server_url: ""           # filled by deploy_agent.py from settings
    #   require_approval: never
    #   allowed_tools:
    #     - knowledge_base_retrieve
    #   project_connection_id: "" # filled by deploy_agent.py (connection name)